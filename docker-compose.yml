name: deutschland-data-mining

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  backend:
    build:
      context: ./backend
    command: sh -c "python -m app.scripts.wait_for_services && alembic upgrade head && if [ \"$APP_ENV\" = \"production\" ]; then uvicorn app.main:app --host 0.0.0.0 --port 8000; else uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload; fi"
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    dns:
      - 1.1.1.1
      - 8.8.8.8
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')\""]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./backend
    command: sh -c "python -m app.scripts.wait_for_services && celery -A app.worker.celery_app:celery_app worker --loglevel=info"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    dns:
      - 1.1.1.1
      - 8.8.8.8
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    logging: *default-logging

  scheduler:
    build:
      context: ./backend
    command: sh -c "python -m app.scripts.wait_for_services && celery -A app.worker.celery_app:celery_app beat --loglevel=info"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    dns:
      - 1.1.1.1
      - 8.8.8.8
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
    command: sh -c "npm install && frontend_mode=$${FRONTEND_APP_ENV:-$$APP_ENV} && if [ \"$$frontend_mode\" = \"production\" ]; then npm run build && npm run start -- --hostname 0.0.0.0 --port 3000; else npm run dev; fi"
    env_file:
      - .env
    environment:
      FRONTEND_APP_ENV: ${FRONTEND_APP_ENV:-}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 90s

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kdp_pipeline}
      POSTGRES_USER: ${POSTGRES_USER:-kdp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kdp}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kdp} -d ${POSTGRES_DB:-kdp_pipeline}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    logging: *default-logging

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    logging: *default-logging

  nginx:
    image: nginx:1.27-alpine
    profiles: ["prod"]
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/certbot/www:/var/www/certbot
      - ./nginx/certbot/conf:/etc/letsencrypt
    restart: unless-stopped
    logging: *default-logging

  certbot:
    image: certbot/certbot:latest
    profiles: ["prod"]
    volumes:
      - ./nginx/certbot/www:/var/www/certbot
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./ops/certbot:/opt/certbot:ro
    entrypoint: ["/bin/sh", "-c"]
    command: ["trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet || true; sleep 12h & wait $${!}; done"]
    restart: unless-stopped
    logging: *default-logging

  uptime-kuma:
    image: louislam/uptime-kuma:1
    profiles: ["monitoring"]
    ports:
      - "${UPTIME_KUMA_PORT:-3001}:3001"
    volumes:
      - uptime_kuma_data:/app/data
    restart: unless-stopped
    logging: *default-logging

volumes:
  postgres_data:
  redis_data:
  uptime_kuma_data:
